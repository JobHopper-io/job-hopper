[build]
  publish = "dist"
  # `npm run build` = type-check + vite build; then pre-render the SEO pages
  # (scripts/generate-seo-pages.mjs) into dist/ so they ship as static HTML.
  command = "npm run build && node scripts/generate-seo-pages.mjs"

# Canonicalize away trailing slashes on SEO pages: /jobs/x/y/ -> /jobs/x/y.
# Our canonical tags have no trailing slash; this prevents the slash variant
# from resolving as a separate duplicate URL. Forced so it wins over the
# folder/index.html serving of the same directory. Must precede the SPA catch-all.
[[redirects]]
  from = "/jobs/*/"
  to = "/jobs/:splat"
  status = 301
  force = true

# Same canonicalization for content pages under /career/ (e.g. /career/no-responses/).
[[redirects]]
  from = "/career/*/"
  to = "/career/:splat"
  status = 301
  force = true

# Bare /jobs (no category/location) has no generated SEO page and no Vue route,
# but dist/jobs/ exists as a directory (holding the generated category/location
# pages), so it counts as an asset match and would 404 before reaching the SPA
# catch-all below. Force it straight to the real job search experience.
[[redirects]]
  from = "/jobs"
  to = "/dashboard"
  status = 301
  force = true

[[redirects]]
  from = "/jobs/"
  to = "/dashboard"
  status = 301
  force = true

# SPA fallback for the Vue app. UNFORCED (no `force`/`!`), so real static files
# — including the pre-rendered /jobs/**/index.html SEO pages — are served first
# and only unmatched paths fall through to the app shell.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
 
[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"

[[headers]]
  for = "/assets/*"
  [headers.values]
    cache-control = '''
    max-age=31536000,
    immutable
    '''
